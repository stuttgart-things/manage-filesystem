---
name: Ansible lint
on:
  push:
    branches:
      - 'main'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - 'main'
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

jobs:
  yaml-lint:
    name: Lint yaml files
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-yaml-lint.yaml@main
    with:
      runs-on: ghr-manage-filesystem-in-cluster
      environment-name: k8s
      continue-error: true
      yamllint-version: 1
      lintprofile-path: .yamllint
      artifact-name: yaml-lint

  ansible-lint:
    name: Lint ansible code
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-ansible-lint.yaml@main # ansible-lint-24.2.1
    with:
      runs-on: ghr-manage-filesystem-in-cluster
      environment-name: k8s
      continue-error: true
      ansible-image: eu.gcr.io/stuttgart-things/sthings-ansible:9.3.0-1
      playbook: tests/test.yml
    needs: yaml-lint
